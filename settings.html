<main class="main-content">

<h1>Settings</h1>

<div class="card">

<label>
Theme
</label>

<select id="theme">
<option>Light</option>
<option>Dark</option>
</select>

<br><br>

<label>
Currency
</label>

<select id="currency">
<option>INR</option>
<option>USD</option>
<option>EUR</option>
<option>GBP</option>
</select>

<br><br>

<label>
Language
</label>

<select id="language">
<option>English</option>
<option>Hindi</option>
<option>French</option>
<option>German</option>
</select>

<br><br>

<label>

<input
type="checkbox"
id="notifications"
>

 Enable Notifications

</label>

<br><br>

<button
id="saveSettings"
class="btn-primary"
>

Save Settings

</button>
